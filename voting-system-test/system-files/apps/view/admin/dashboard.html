<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../../../public/css/admin.css">
	<title>University Voting</title>
</head>
	<body>
		<div class = "sidebar">
			<div class = "container">
				<div class = "sidebar-content">
					<div class="title">
						<h1>University </h1><h1 class="elec">Election</h1>
					</div>
					<div class = "body">
						<ul>
							<li>
								<a href="../admin/dashboard.html" class = "active">
									<img src = "../../../public/img/icons/i-dashboard.png" alt = "icon">	
									<span>Dashboard</span>
								</a>
							</li>
							<li>
								<a href="../admin/view-vote.html" class = "inactive">
									<img src = "../../../public/img/icons/i-view-vote.png" alt = "icon">	
									<span>View Vote</span>
								</a>
							</li>
							<li>
								<a href="../admin/user-management.html" class = "inactive">
									<img src = "../../../public/img/icons/i-user-management.png" alt = "icon">
									<span>User Management</span>
								</a>
							</li>
							<li>
								<a href="../admin/tools.html" class = "inactive">
									<img src = "../../../public/img/icons/i-tools.png" alt = "icon">
									<span>Tools</span>
								</a>
							</li>
						</ul>
						<button id = "logout-btn">Logout</button>
					</div>
				</div>
			</div>
		</div>
		<section class = "dashboard-sec">
			<div class = "container">
				<div class ="dash-container">
					<div class = "title">
						<h1>Dashboard</h1>
						<div class="desc">
							<p>Welcome back,</p><h3>Admin</h3>
						</div>
					</div>
					<div class = "analytics">
						<div class = "ana-card" id = "total-stud">
							<h3>Total Registered Students</h3>
							<h1>0</h1>
						</div>
						<div class = "ana-card" id = "total-cad">
							<h3>Total Candidate</h3>
							<h1>0</h1>
						</div>
						<div class = "ana-card" id = "vote-turnout">
							<h3>Voter Turnout</h3>
							<h1>0%</h1>
						</div>
						<div class = "ana-card" id = "vote-cast">
							<h3>Vote Cast</h3>
							<h1>0</h1>
						</div>
					</div>
					<div class = "overview">
						<h3>Candidate Overview</h3>
						<div class="cand-graph">
							<div class="graph"></div>
							<div class="graph"></div>
							<div class="graph"></div>
							<div class="graph"></div>
							<div class="graph"></div>
						</div>
					</div>
				</div>
			</div>
		</section>
		<script src="../../../public/js/admin-common.js"></script>
		<script>
			// Fetch Analytics Data
			async function loadAnalytics() {
				try {
					const res = await fetch('../../../public/api/admin/analytics.php');
					const json = await res.json();
					if (json.success) {
						const data = json.data;
						
						// Update cards
						document.querySelector('#total-stud h1').textContent = data.total_students;
						document.querySelector('#total-cad h1').textContent = data.total_candidates;
						document.querySelector('#vote-turnout h1').textContent = data.voter_turnout + '%';
						document.querySelector('#vote-cast h1').textContent = data.votes_cast;

						// Render candidate overview standing bars
						const graphContainer = document.querySelector('.cand-graph');
						graphContainer.innerHTML = ''; // Clear hardcoded skeletons

						if (data.candidates && data.candidates.length > 0) {
							// Determine max votes for scale
							const maxVotes = Math.max(...data.candidates.map(c => parseInt(c.vote_count)), 1);

							data.candidates.forEach(c => {
								const percentage = Math.round((parseInt(c.vote_count) / maxVotes) * 100);
								const item = document.createElement('div');
								item.style.marginBottom = '15px';
								item.style.width = '100%';
								item.innerHTML = `
									<div style="display: flex; justify-content: space-between; font-weight: 500; font-size: 0.9em; margin-bottom: 5px; color: #444;">
										<span>${c.firstname} ${c.lastname} (${c.position} - ${c.partylist || 'Independent'})</span>
										<span style="font-weight: bold; color: #1a73e8;">${c.vote_count} votes</span>
									</div>
									<div style="background: #eef2f5; border-radius: 6px; height: 10px; width: 100%; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);">
										<div style="background: linear-gradient(90deg, #3b82f6, #1d4ed8); width: ${percentage}%; height: 100%; border-radius: 6px; transition: width 0.6s ease;"></div>
									</div>
								`;
								graphContainer.appendChild(item);
							});
						} else {
							graphContainer.innerHTML = '<p style="color: #888; font-size: 0.95em;">No candidates registered yet.</p>';
						}
					}
				} catch (err) {
					console.error("Error loading analytics:", err);
				}
			}

			loadAnalytics();
		</script>
	</body>
</html>
